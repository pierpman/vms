apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "management-server.serviceAccountName" . }}
  labels:
    application: skupperx
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
  - patch
- apiGroups:
  - cert-manager.io
  resources:
  - issuers
  - certificates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    application: skupperx
  name: {{ include "management-server.serviceAccountName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "management-server.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "management-server.serviceAccountName" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "management-server.clusterRbacName" . }}
  labels:
    {{- include "management-server.labels" . | nindent 4 }}
    application: skupperx
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - list
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
      - secrets
      - configmaps
      - pods
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - skupper.io
    resources:
      - sites
      - links
      - networks
      - networkaccesses
      - routeraccesses
      - listeners
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "management-server.clusterRbacName" . }}
  labels:
    {{- include "management-server.labels" . | nindent 4 }}
    application: skupperx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "management-server.clusterRbacName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "management-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
